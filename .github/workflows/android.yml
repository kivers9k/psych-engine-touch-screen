name: mobile build
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  Android:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: setup java jdk
      uses: actions/setup-java@main
      with:
        distribution: "temurin"
        java-version: "17"

    - name: setup haxe
      uses: krdlab/setup-haxe@master
      with:
        haxe-version: 4.2.5
    
    - name: Install Libraries
      run: |
        haxelib git discord_rpc https://github.com/Aidan63/linc_discord-rpc master
        haxelib install flixel 6.1.2
        haxelib install flixel-addons 4.0.1
        haxelib install flixel-ui 2.6.4
        haxelib install hscript 2.7.0
        haxelib install hxCodec 2.5.1
        haxelib git hxcpp https://github.com/kittycathy233/hxcpp.git main
        haxelib git lime https://github.com/kittycathy233/lime main
        haxelib git linc_luajit https://github.com/superpowers04/linc_luajit master
        haxelib install openfl 9.5.0
        haxelib install tjson 1.4.0

    - name: Configure Android
      run: |
        haxelib run lime config ANDROID_SDK $ANDROID_HOME
        haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_LATEST_HOME
        haxelib run lime config JAVA_HOME $JAVA_HOME
        haxelib run lime config ANDROID_SETUP true

    - name: compile
      run: |
        haxelib run lime build android

    - name: upload artifact 
      uses: actions/upload-artifact@main
      with:
        name: outputBuild
        path: export/release/android/bin/app/build/outputs/apk/debug/*.apk
        if-no-files-found: error